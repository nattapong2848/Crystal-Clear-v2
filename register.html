<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Crystal Clear | กรอกข้อมูลลูกค้า</title><link rel="stylesheet" href="styles.css"></head><body>
<header class="topbar"><a class="brand" href="index.html"><img src="assets/logo.jpeg" alt="Crystal Clear"><span>Crystal <b>Clear</b></span></a><a class="portal-btn" href="login.html">🔑 <span>Seller Portal</span></a></header>
<main class="wrap"><section class="form-card glass"><h1>ลงทะเบียนสั่งทำรีเทนเนอร์</h1><p class="subtitle">กรอกข้อมูลให้ครบถ้วน เพื่อให้ร้านเปิดออเดอร์และจัดส่งชุดพิมพ์ฟันได้ถูกต้อง</p><form id="registerForm"><div class="field"><label>ชื่อ</label><input id="name" required placeholder="เช่น Earth"></div><div class="field"><label>เบอร์โทร</label><input id="phone" required placeholder="เช่น 0864080008"></div><div class="field"><label>Line ID</label><input id="line" required placeholder="Line ID ของลูกค้า"></div><div class="field"><label>ที่อยู่จัดส่ง</label><textarea id="address" required rows="4" placeholder="บ้านเลขที่ / ถนน / แขวง / เขต / จังหวัด / รหัสไปรษณีย์"></textarea></div><div class="field"><label>ประเภทงาน</label><input type="hidden" id="productType" value="both"><div class="product-grid"><div class="product-card" data-product="upper"><strong>ชิ้นบน</strong><span>นับเป็น 1 ชิ้น</span></div><div class="product-card" data-product="lower"><strong>ชิ้นล่าง</strong><span>นับเป็น 1 ชิ้น</span></div><div class="product-card selected" data-product="both"><strong>ชิ้นบน + ล่าง</strong><span>นับเป็น 2 ชิ้น</span></div></div></div><button class="primary-btn" type="submit">ส่งข้อมูลและสร้างออเดอร์</button></form></section></main><div class="toast" id="toast"></div><script src="config.js"></script><script src="app.js"></script><script>CC.initRegisterPage()</script></body></html>
